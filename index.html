<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye from Marquis</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 { margin-top: 0; color: #e2e8f0; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        textarea, input {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        textarea:focus, input:focus { outline: none; border-color: #3b82f6; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Marquis is in big trouble... 😼⚖️</h2>
        <p>If you have a quick second, let us know where Marquis failed in his noble duties to assist you. We are gathering evidence to put him on trial, and your testimony will decide his fate.</p>
        
        <form action="https://api.web3forms.com/submit" method="POST">
            
            <input type="hidden" name="access_key" value="40c9596d-231b-4628-94c4-5403ae4b76b7">
            
            <input type="hidden" name="redirect" value="https://web3forms.com/success">

            <input type="email" name="email" placeholder="Your Email (Optional)">
            <textarea name="feedback" rows="4" placeholder="Why did you uninstall? (e.g., Too buggy, didn't need it, confusing UI...)" required></textarea>
            
            <button type="submit">Send Feedback</button>
        </form>
    </div>

</body>
</html>
