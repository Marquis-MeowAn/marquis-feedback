<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye from Marquis</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* 🟢 Prevents scrollbars if GIFs bleed off the edge */
        }

        /* 🟢 The Background Collage Container */
        #background-collage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Sits firmly behind the form */
            pointer-events: none; /* Lets clicks pass through to the form */
        }

        /* 🟢 Individual GIF styling */
        .collage-gif {
            position: absolute;
            object-fit: cover;
            /*opacity: 0.15; /* Dimmed to blend into your dark theme */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            /* 🟢 FIXED: Forces the browser to render the GIFs sharply instead of blurring them when resized */
            image-rendering: pixelated; 
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            /* 🟢 Makes the repositioning smooth and floaty instead of a harsh snap */
            transition: all 4.5s ease-in-out; 
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative; /* 🟢 Needed for z-index */
            z-index: 10; /* 🟢 Keeps your form securely above the GIFs */
        }
        
        /* 🟢 NEW: Logo Styling */
        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 16px;
            image-rendering: -webkit-optimize-contrast; /* Keeps the logo ultra-crisp */
        }

        h2 { margin-top: 0; color: #e2e8f0; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        textarea, input {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        textarea:focus, input:focus { outline: none; border-color: #3b82f6; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div id="background-collage"></div>

    <div class="container">
        <img src="img/46087a1c-4b4d-4a36-a268-1b57cb06908c.png" alt="Marquis Logo" class="logo-img">
        
        <h2>The Marquis of Meow'An is in big trouble...</h2>
        <p>If you have a quick second, let us know where Marquis failed in his noble duties to assist you. We are gathering evidence to put him on trial, and your testimony will decide his fate.</p>
        
        <form action="https://api.web3forms.com/submit" method="POST">
            
            <input type="hidden" name="access_key" value="40c9596d-231b-4628-94c4-5403ae4b76b7">
            <input type="hidden" name="redirect" value="https://web3forms.com/success">

            <input type="email" name="email" placeholder="Your Email (Optional)">
            <textarea name="feedback" rows="4" placeholder="Why did you uninstall? (e.g., Too buggy, didn't need it, confusing UI...)" required></textarea>
            
            <button type="submit">Send Feedback</button>
        </form>
    </div>

    <script>
        // 🚨 Replace these placeholders with the actual filenames of your 45 GIFs!
        const gifUrls = [
            'img/gif1.gif', 'img/gif2.gif', 'img/gif3.gif', 'img/gif4.gif', 'img/gif5.gif',
            'img/gif6.gif', 'img/gif7.gif', 'img/gif8.gif', 'img/gif9.gif', 'img/gif10.gif',
            'img/gif11.gif', 'img/gif12.gif', 'img/gif13.gif', 'img/gif14.gif', 'img/gif15.gif',
            'img/gif16.gif', 'img/gif17.gif', 'img/gif18.gif', 'img/gif19.gif', 'img/gif20.gif',
            'img/gif21.gif', 'img/gif22.gif', 'img/gif23.gif', 'img/gif24.gif', 'img/gif25.gif',
            'img/gif26.gif', 'img/gif27.gif', 'img/gif28.gif', 'img/gif29.gif', 'img/gif30.gif',
            'img/gif31.gif', 'img/gif32.gif', 'img/gif33.gif', 'img/gif34.gif', 'img/gif35.gif',
            'img/gif36.gif', 'img/gif37.gif', 'img/gif38.gif', 'img/gif39.gif', 'img/gif40.gif',
            'img/gif41.gif', 'img/gif42.gif', 'img/gif43.gif', 'img/gif44.gif', 'img/gif45.gif',
        ];

        const collage = document.getElementById('background-collage');
        const totalImagesToRender = 45;
        let isInitialized = false;

        function updateCollage() {
            if (!isInitialized) {
                for (let i = 0; i < totalImagesToRender; i++) {
                    const gif = document.createElement('img');
                    gif.className = 'collage-gif';
                    
                    const randomGif = gifUrls[Math.floor(Math.random() * gifUrls.length)];
                    gif.src = randomGif;
                    
                    collage.appendChild(gif);
                }
                isInitialized = true;
            }

            const gifs = document.querySelectorAll('.collage-gif');
            
            gifs.forEach(gif => {
                const size = 120 + Math.random() * 160;
                gif.style.width = size + 'px';
                gif.style.height = size + 'px';
                
                const posX = Math.random() * window.innerWidth - (size / 2);
                const posY = Math.random() * window.innerHeight - (size / 2);
                
                gif.style.left = posX + 'px';
                gif.style.top = posY + 'px';

                const rotation = (Math.random() - 0.5) * 50;
                gif.style.transform = `rotate(${rotation}deg)`;
            });
        }

        window.onload = () => {
            updateCollage();
            setInterval(updateCollage, 5000); 
        };
        
        window.onresize = updateCollage; 
    </script>
</body>
</html>
